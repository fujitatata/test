    const questionCategory = document.getElementById('questionCategory');
    const progressBar = document.getElementById('progressBar');
    const questionText = document.getElementById('questionText');
    const choices = document.getElementById('choices');
    const backBtn = document.getElementById('backBtn');
    const nextBtn = document.getElementById('nextBtn');

    startBtn.addEventListener('click', () => {
      startScreen.classList.add('hidden');
      questionScreen.classList.remove('hidden');
      renderQuestion();
    });

    backBtn.addEventListener('click', () => {
      if (state.currentIndex === 0) {
        questionScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        return;
      }
      state.currentIndex -= 1;
      renderQuestion();
    });

    nextBtn.addEventListener('click', () => {
      if (state.answers[state.currentIndex] === null) return;

      if (state.currentIndex === questions.length - 1) {
        showResult();
        return;
      }

      state.currentIndex += 1;
      renderQuestion();
    });

    function renderQuestion() {
      const q = questions[state.currentIndex];
      const selected = state.answers[state.currentIndex];

      questionCount.textContent = `Question ${state.currentIndex + 1} / ${questions.length}`;
      questionCategory.textContent = q.type === 'career' ? 'キャリア診断' : '知識診断';
      questionText.textContent = q.question;
      progressBar.style.width = `${((state.currentIndex + 1) / questions.length) * 100}%`;
      nextBtn.disabled = selected === null;

      choices.innerHTML = '';

      q.options.forEach((option, optionIndex) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = [
          'choice-card w-full rounded-2xl border p-4 text-left',
          selected === optionIndex ? 'is-selected' : 'border-slate-200 bg-white'
        ].join(' ');

        button.innerHTML = `
          <div class="flex items-start gap-3">
            <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full ${selected === optionIndex ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'} text-sm font-black">
              ${option.label}
            </span>
            <span class="pt-1 text-sm font-bold leading-6 text-slate-800">${escapeHtml(option.text)}</span>
          </div>
        `;

        button.addEventListener('click', () => {
          state.answers[state.currentIndex] = optionIndex;
          renderQuestion();
        });

        choices.appendChild(button);
      });
    }

    function showResult() {
      const result = calculateResult();

      questionScreen.classList.add('hidden');
      resultScreen.classList.remove('hidden');
      resultScreen.innerHTML = createResultHtml(result);

      setTimeout(() => {
        document.querySelectorAll('[data-bar]').forEach((bar) => {
          bar.style.width = bar.dataset.width;
        });
      }, 100);
    }

    function calculateResult() {
      const scores = { SELF: 0, SIDE: 0, FREE: 0, CAREER: 0 };
      let knowledgeScore = 0;
      const reasons = [];
      const skillResults = {
        HTML: 0,
        CSS: 0,
        JavaScript: 0,
        Responsive: 0,
        Form: 0
      };

      questions.forEach((q, index) => {
        const answerIndex = state.answers[index];
        const option = q.options[answerIndex];

        if (q.type === 'career') {
          Object.keys(scores).forEach((key) => {
            scores[key] += option.scores[key] || 0;
          });
          reasons.push(option.reason);
        }

        if (q.type === 'knowledge') {
          if (option.isCorrect) {
            knowledgeScore += 1;
            skillResults[q.skill] = 1;
          }
        }
      });

      const priority = ['CAREER', 'FREE', 'SIDE', 'SELF'];
      const maxType = Object.keys(scores).sort((a, b) => {
        if (scores[b] === scores[a]) {
          return priority.indexOf(a) - priority.indexOf(b);
        }
        return scores[b] - scores[a];
      })[0];

      const maxScore = Math.max(...Object.values(scores));
      const scorePercentages = {};
      Object.keys(scores).forEach((key) => {
        scorePercentages[key] = maxScore === 0 ? 0 : Math.round((scores[key] / maxScore) * 100);
      });

      const level = getKnowledgeLevel(knowledgeScore);
      const content = resultContents[maxType];

      return {
        type: maxType,
        scores,
        scorePercentages,
        knowledgeScore,
        level,
        content,
        reasons: [...new Set(reasons)].slice(0, 4),
        skillResults
      };
    }

    function getKnowledgeLevel(score) {
      if (score <= 2) {
        return {
          label: '初心者レベル',
          stars: 2,
          current: '初心者',
          description: '基礎をこれから固めていく段階です。焦らず順番に学べば十分伸ばせます。'
        };
      }

      if (score <= 4) {
        return {
          label: '初級レベル',
          stars: 3,
          current: '初級者',
          description: '基本知識はあります。実際に手を動かす課題で理解を深めると伸びやすい段階です。'
        };
      }

      return {
        label: '中級レベル',
        stars: 4,
        current: '中級者',
        description: '基礎知識はかなり身についています。実案件やポートフォリオ制作に進みやすい状態です。'
      };
    }

    function createResultHtml(result) {
      const { content } = result;

      return `
        <div class="space-y-5 pb-10">
          <div class="overflow-hidden rounded-[28px] bg-white shadow-xl shadow-blue-100/70">
            <div class="bg-gradient-to-br from-blue-600 via-blue-500 to-sky-400 px-6 py-8 text-center text-white">
              <p class="text-sm font-bold text-blue-50">あなたに最適な学習プランは…</p>
              <h2 class="mt-3 text-[27px] font-black leading-tight">
                【${content.catchyName}】<br />プランです！
              </h2>
              <p class="mt-3 inline-flex rounded-full bg-white/20 px-4 py-2 text-sm font-bold backdrop-blur">
                ${content.typeName}
              </p>
            </div>

            <div class="px-6 py-6">
              <p class="rounded-2xl bg-blue-50 p-4 text-sm font-bold leading-7 text-slate-700">
                ${content.comment}
              </p>
            </div>
          </div>

          ${createScoreGraphHtml(result)}

          ${createKnowledgeHtml(result)}

          ${createGoalTimelineHtml(result)}

          ${createReasonHtml(result)}

          ${createRoadmapHtml(result)}

          ${createPlanHtml(result)}

          ${createCtaHtml(result)}
        </div>
      `;
    }

    function createScoreGraphHtml(result) {
      const labels = {
        SELF: '独学',
        SIDE: '副業',
        FREE: 'フリーランス',
        CAREER: '転職'
      };

      return `
        <section class="rounded-[24px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <div class="mb-4">
            <p class="text-xs font-bold text-blue-600">FUTURE FIT SCORE</p>
            <h3 class="mt-1 text-lg font-black text-slate-900">将来の適性スコア</h3>
          </div>

          <div class="space-y-4">
            ${Object.keys(labels).map((key) => {
              const isTop = key === result.type;
              return `
                <div>
                  <div class="mb-1 flex justify-between text-sm">
                    <span class="${isTop ? 'font-black text-blue-600' : 'font-bold text-slate-600'}">${labels[key]}</span>
                    <span class="${isTop ? 'font-black text-blue-600' : 'font-bold text-slate-500'}">${result.scorePercentages[key]}%</span>
                  </div>
                  <div class="h-3 overflow-hidden rounded-full bg-slate-100">
                    <div data-bar data-width="${result.scorePercentages[key]}%" class="bar-fill h-full rounded-full ${isTop ? 'bg-blue-600' : 'bg-slate-300'}" style="width:0%;"></div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function createKnowledgeHtml(result) {
      const skillLabels = {
        HTML: 'HTML',
        CSS: 'CSS',
        JavaScript: 'JavaScript',
        Responsive: 'レスポンシブ',
        Form: 'フォーム'
      };

      return `
        <section class="rounded-[24px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-bold text-blue-600">CURRENT SKILL</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">現在の知識レベル</h3>

          <div class="mt-4 rounded-2xl bg-slate-50 p-4">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm font-bold text-slate-500">正答数</p>
                <p class="text-2xl font-black text-blue-600">${result.knowledgeScore} / 5</p>
              </div>
              <div class="text-right">
                <p class="text-lg font-black text-slate-900">${renderStars(result.level.stars)}</p>
                <p class="text-sm font-bold text-blue-600">${result.level.label}</p>
              </div>
            </div>
            <p class="mt-3 text-sm leading-6 text-slate-600">${result.level.description}</p>
          </div>

          <div class="mt-4 grid grid-cols-1 gap-3">
            ${Object.keys(skillLabels).map((key) => `
              <div class="flex items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3">
                <span class="text-sm font-bold text-slate-700">${skillLabels[key]}</span>
                <span class="text-sm font-black ${result.skillResults[key] ? 'text-blue-600' : 'text-slate-300'}">
                  ${result.skillResults[key] ? '★★★☆☆' : '★☆☆☆☆'}
                </span>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function createGoalTimelineHtml(result) {
      return `
        <section class="rounded-[24px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-bold text-blue-600">YOUR ROUTE</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">現在地とゴール</h3>

          <div class="mt-5 space-y-3">
            ${timelineCard('01', '現在地', result.level.current, 'bg-slate-100 text-slate-600')}
            ${timelineCard('02', '目標', result.content.goal, 'bg-blue-100 text-blue-600')}
            ${timelineCard('03', 'おすすめ', result.content.label, 'bg-emerald-100 text-emerald-600')}
          </div>
        </section>
      `;
    }

    function timelineCard(number, label, text, badgeClass) {
      return `
        <div class="flex gap-3 rounded-2xl border border-slate-200 bg-white p-4">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full ${badgeClass} text-sm font-black">
            ${number}
          </div>
          <div>
            <p class="text-xs font-bold text-slate-400">${label}</p>
            <p class="mt-1 text-sm font-black leading-6 text-slate-800">${text}</p>
          </div>
        </div>
      `;
    }

    function createReasonHtml(result) {
      return `
        <section class="rounded-[24px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-bold text-blue-600">WHY THIS PLAN</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">おすすめ理由</h3>

          <div class="mt-4 space-y-3">
            ${result.reasons.map((reason) => `
              <div class="flex gap-3 rounded-2xl bg-blue-50 p-4">
                <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-blue-600 text-xs font-black text-white">✓</span>
                <p class="text-sm font-bold leading-6 text-slate-700">${reason}</p>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function createRoadmapHtml(result) {
      return `
        <section class="rounded-[24px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-bold text-blue-600">PERSONAL ROADMAP</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">あなた専用ロードマップ</h3>

          <div class="mt-5 space-y-4">
            ${result.content.roadmap.map((step, index) => `
              <div class="relative flex gap-4">
                <div class="flex flex-col items-center">
                  <div class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-600 text-sm font-black text-white">
                    ${index + 1}
                  </div>
                  ${index !== result.content.roadmap.length - 1 ? '<div class="mt-2 h-12 w-[2px] bg-blue-100"></div>' : ''}
                </div>
                <div class="pb-3">
                  <p class="text-xs font-bold text-blue-600">${step[0]}</p>
                  <p class="mt-1 text-sm font-black text-slate-900">${step[1]}</p>
                  <p class="mt-1 text-sm leading-6 text-slate-600">${step[2]}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function createPlanHtml(result) {
      const content = result.content;

      return `
        <section class="rounded-[24px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-bold text-blue-600">RECOMMENDED PLAN</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">おすすめプラン紹介</h3>

          <div class="mt-4 rounded-2xl bg-gradient-to-br from-blue-600 to-sky-400 p-5 text-white">
            <p class="text-sm font-bold text-blue-100">あなたにおすすめ</p>
            <p class="mt-1 text-2xl font-black">${content.label}</p>
          </div>

          <div class="mt-4 grid gap-3">
            ${infoCard('特徴', content.planFeatures)}
            ${infoCard('向いている人', content.suitableFor)}
            ${infoCard('サポート内容', content.support)}
          </div>

          <a href="${content.ctaUrl}" class="primary-btn mt-5 block rounded-2xl bg-blue-600 px-5 py-4 text-center text-sm font-black text-white shadow-lg shadow-blue-100">
            ${content.ctaText}
          </a>
        </section>
      `;
    }

    function infoCard(title, items) {
      return `
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <p class="text-sm font-black text-slate-900">${title}</p>
          <ul class="mt-2 space-y-1 text-sm leading-6 text-slate-600">
            ${items.map((item) => `<li>・${item}</li>`).join('')}
          </ul>
        </div>
      `;
    }

    function createCtaHtml(result) {
      return `
        <section class="overflow-hidden rounded-[28px] bg-gradient-to-br from-slate-900 to-blue-900 p-6 text-white shadow-xl shadow-blue-100/70">
          <p class="text-sm font-bold text-blue-100">診断結果をもとに相談できます</p>
          <h3 class="mt-2 text-2xl font-black leading-tight">
            あなたに合う学習ルートを<br />メンターに相談しませんか？
          </h3>
          <p class="mt-3 text-sm leading-7 text-blue-50">
            「この結果で本当に合っている？」「どのコースを選ぶべき？」という疑問を、無料メンター相談で確認できます。
          </p>

          <a href="${result.content.mentorUrl}" class="primary-btn mt-5 block rounded-2xl bg-emerald-500 px-5 py-4 text-center text-sm font-black text-white shadow-lg shadow-emerald-900/20">
            無料メンター相談を予約する
          </a>

          <button onclick="restartDiagnosis()" class="secondary-btn mt-3 w-full rounded-2xl border border-white/30 bg-white/10 px-5 py-4 text-sm font-black text-white">
            もう一度診断する
          </button>
        </section>
      `;
    }

    function restartDiagnosis() {
      state.currentIndex = 0;
      state.answers = Array(questions.length).fill(null);
      resultScreen.classList.add('hidden');
      startScreen.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderStars(count) {
      return '★'.repeat(count) + '☆'.repeat(5 - count);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
